name: discord_rochana
version: 0.1.0
description: "ROCHANA Discord bot — chat brain via Claude CLI + a 2-hourly mail/calendar/news brief"
entrypoint: plug.py:DiscordRochanaPlug
provides: [chat, scheduled_brief]
requires_env: [DISCORD_ROCHANA_TOKEN, BOSS_DISCORD_CHANNEL_ID]
# Mail/Calendar come from MCP connectors registered in the `claude` CLI itself
# (see README). They degrade gracefully — news + chat work without them — so
# they're not a hard requirement here.
enabled_default: true
