# ROCHANA behaviour config (non-secret — safe to commit).
# Secrets live in .env. Persona voice lives in personas/rochana.md.

persona_file: personas/rochana.md
boss_nickname: "พี่ปิ๊ก"
timezone: Asia/Bangkok

brain:
  # Model IDs must exist in your installed `claude` CLI. Sonnet is the safe
  # default for both chat and the recurring brief. Use Opus only if you accept
  # the higher recurring cost of a job that runs every 2 hours.
  chat_model: claude-sonnet-4-5
  brief_model: claude-sonnet-4-5
  chat_max_turns: 6
  brief_max_turns: 12
  chat_timeout_s: 120
  brief_timeout_s: 300
  # Tools the brain is allowed to call. WebSearch powers news; the mcp__*
  # globs match whatever servers you define in config/mcp.json.
  allowed_tools:
    - WebSearch
    - "mcp__gmail__*"
    - "mcp__gcal__*"
  mcp_config: config/mcp.json

proactivity:
  quiet_start: 21          # 21:00 — start of quiet window
  quiet_end: 8             # 08:00 — end of quiet window (wraps midnight)
  max_daily_boss_messages: 8

brief:
  cron_hours: "8-20/2"     # every 2h during waking hours: 8,10,12,14,16,18,20
  cron_minute: 0
  include: [mail, calendar, news]

# Plugs to load. Drop a folder in src/plugd/plugs/<name>/ and list it here.
enabled_plugs:
  - discord_rochana
